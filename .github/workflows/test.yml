name: Frontend Coverage

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend test dependencies
        working-directory: frontend/src/__tests__
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend/src/__tests__
        run: npx jest --config jest.config.cjs --coverage --coverageReporters=lcov --watchAll=false

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/src/__tests__/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
