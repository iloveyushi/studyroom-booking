openapi: 3.0.0
info:
  title: 自习室预约系统 API
  description: 基于SpringBoot实现的自习室预约管理接口文档
  version: 1.0.0

paths:
  /api/login:
    get:
      summary: 登录页面
      responses:
        '200':
          description: 成功返回登录页

  /api/login/check:
    post:
      summary: 用户登录验证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginForm'
      responses:
        '200':
          description: 登录成功或失败

  /api/logout:
    get:
      summary: 用户退出登录
      responses:
        '200':
          description: 退出成功

  /api/classrooms/available:
    get:
      summary: 查询可预约教室
      responses:
        '200':
          description: 返回教室列表

  /api/reservations:
    post:
      summary: 创建自习室预约
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Reservation'
      responses:
        '200':
          description: 预约成功

  /api/user/reservations:
    get:
      summary: 获取当前用户预约记录
      responses:
        '200':
          description: 返回预约列表

  /api/user/reservations/cancel:
    post:
      summary: 取消预约
      responses:
        '200':
          description: 取消成功

  /api/user/info:
    get:
      summary: 获取个人信息
      responses:
        '200':
          description: 返回用户信息

  /api/admin/classrooms:
    get:
      summary: 管理员获取所有教室
      responses:
        '200':
          description: 返回教室管理列表
    post:
      summary: 管理员添加教室
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Classroom'
      responses:
        '200':
          description: 添加成功

  /api/admin/reservations:
    get:
      summary: 管理员查看所有预约
      responses:
        '200':
          description: 返回所有预约记录

  /api/admin/blacklist:
    get:
      summary: 获取黑名单
      responses:
        '200':
          description: 返回黑名单列表
    post:
      summary: 添加用户到黑名单
      responses:
        '200':
          description: 操作成功

components:
  schemas:
    LoginForm:
      type: object
      properties:
        username:
          type: string
        password:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string

    Reservation:
      type: object
      properties:
        classroomId:
          type: integer
        date:
          type: string
        timeSlot:
          type: string

    Classroom:
      type: object
      properties:
        name:
          type: string
        seatCount:
          type: integer
        status:
          type: string