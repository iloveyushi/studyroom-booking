<div class="modal fade" id="modal-blacklist" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">设置黑名单信息</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="mb-3"><label class="col-form-label">学号</label><select class="form-control form-select" id="bl_student_id"></select></div><div class="mb-3"><label class="col-form-label">设置时间</label><input id="bl_daterange" class="form-control input-daterange-datepicker"></div></div><div class="modal-footer"><button type="button" id="addBlacklistBtn" class="btn btn-primary" data-bs-dismiss="modal">确认添加</button><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button></div></div></div></div>
