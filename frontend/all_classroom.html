        <div class="row"><div class="col-lg-12"><div class="card"><div class="card-header fix-card"><div class="row"><div class="col-8"><h4 class="card-title">教室信息</h4></div><div class="col-4 form-group text-end"><button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-add-classroom">添加新教室</button><button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-add-classroom-available">新增教室可用时段</button></div></div></div>
            <div class="card-body"><div class="table-responsive"><table id="example1" class="display nowrap"><thead><tr><th>教室</th><th>教室号</th><th>楼层</th><th>教学楼</th><th>座位数</th><th>多媒体教室</th><th></th></tr></thead><tbody id="classroomTableBody"><tr><td colspan="7" class="text-center">加载中...</td></tr></tbody></table></div><p id="classroomMsg" class="text-danger text-center mt-2"></p></div>

<div class="modal fade" id="modal-add-classroom" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">添加教室</h5><button type="button" class="close" data-bs-dismiss="modal"><span>&times;</span></button></div><div class="modal-body"><div class="row"><div class="col-xl-4"><input id="add_room_id" class="form-control" placeholder="教室编号"></div><div class="col-xl-4"><input id="add_room_name" class="form-control" placeholder="教室名称"></div><div class="col-xl-4"><input id="add_room_floor" class="form-control" placeholder="教室楼层"></div></div><div class="row mt-2"><div class="col-xl-4"><input id="add_available_seat" class="form-control" placeholder="教室座位数"></div><div class="col-xl-4"><input id="add_building_id" class="form-control" placeholder="所属教学楼编号"></div><div class="col-xl-4"><select id="add_is_multimedia_room" class="form-control form-select"><option value="">是否多媒体</option><option>是</option><option>否</option></select></div></div></div><div class="modal-footer"><button type="button" id="addClassroomBtn" class="btn btn-primary" data-bs-dismiss="modal">确认添加</button><button type="button" class="btn btn-danger" data-bs-dismiss="modal">关闭</button></div></div></div></div>
<div class="modal fade" id="modal-add-classroom-available" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">新增教室可用时段</h5><button type="button" class="close" data-bs-dismiss="modal"><span>&times;</span></button></div><div class="modal-body"><div class="row"><div class="col-xl-6"><input id="av_room_id" class="form-control" placeholder="教室编号"></div><div class="col-xl-6"><input id="av_time_id" class="form-control" placeholder="时段编号"></div></div><div class="row mt-2"><div class="col-xl-6"><input id="av_building_id" class="form-control" placeholder="教学楼编号"></div><div class="col-xl-6"><input id="av_available_num" class="form-control" placeholder="可预约数量"></div></div><div class="row mt-2"><div class="col-xl-6"><input id="av_available_date" class="form-control" placeholder="日期(yyyy-MM-dd)"></div></div></div><div class="modal-footer"><button type="button" id="addClassroomAvailableBtn" class="btn btn-primary" data-bs-dismiss="modal">确认添加</button><button type="button" class="btn btn-danger" data-bs-dismiss="modal">关闭</button></div></div></div></div>
