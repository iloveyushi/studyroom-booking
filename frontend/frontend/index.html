<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Reservation Frontend</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<main class="container">
  <h1>教室预约系统（前后端分离示例）</h1>

  <section class="panel">
    <h2>1. 登录</h2>
    <form id="loginForm">
      <label>用户名 <input id="username" required></label>
      <label>密码 <input id="password" type="password" required></label>
      <button type="submit">登录</button>
    </form>
  </section>

  <section class="panel">
    <h2>2. 当前用户</h2>
    <button id="meBtn">读取 /api/auth/me</button>
    <pre id="meResult"></pre>
  </section>

  <section class="panel">
    <h2>3. 查询可预约教室</h2>
    <button id="availableBtn">读取 /api/user/reservations/available</button>
    <pre id="availableResult"></pre>
  </section>

  <section class="panel">
    <h2>4. 退出</h2>
    <button id="logoutBtn">退出登录</button>
    <pre id="logoutResult"></pre>
  </section>
</main>

<script src="./app.js"></script>
</body>
</html>
