<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>预约-自习管理系统</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="/assets/main/css/fonts.css">
    <link rel="stylesheet" href="/assets/main/css/style.css">
</head>
<body>
<div id="main-wrapper" class="show">
    <aside class="left-panel nicescroll-box">
        <nav class="navigation">
            <ul class="list-unstyled main-menu">
                <li class="has-submenu">
                    <a href="/student_index" class="has-submenu active">
                        <i class="fas fa-th-large"></i>
                        <span class="nav-label">首页</span>
                    </a>
                </li>
                <li class="has-submenu active">
                    <a href="#" class="has-arrow mm-collapsed">
                        <i class="fas fa-calendar-alt"></i>
                        <span class="nav-label">预约管理</span>
                    </a>
                    <ul class="list-unstyled mm-collapse">
                        <li class="active"><a href="/make_reservation">预约自习室</a></li>
                        <li><a href="/user_reservation">我的预约</a></li>
                    </ul>
                </li>
                <li class="has-submenu">
                    <a href="/personal_settings">
                        <i class="fas fa-cog"></i>
                        <span class="nav-label">设置</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="header">
        <header class="top-head container-fluid">
            <div class="nav-control">
                <div class="hamburger">
                    <span class="line"></span><span class="line"></span><span class="line"></span>
                </div>
                <div class="left-header content-header__menu">
                    <ul class="list-unstyled">
                        <li class="nav-link btn">
                            <a href="/make_reservation"><i class="far fa-calendar-check"></i> <span> 新添加自习预约 </span></a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="header-right">
                <div class="fullscreen notification_dropdown">
                    <div class="full">
                        <a class="text-dark" href="#!" onclick="javascript:toggleFullScreen()">
                            <i class="fas fa-expand"></i>
                        </a>
                    </div>
                </div>
                <div class="my-account-wrapper">
                    <div class="account-wrapper">
                        <div class="account-control">
                            <a class="login header-profile" href="#" title="Sign in">
                                <div class="header-info">
                                    <span id="headerUserName">未登录</span>
                                    <small id="headerUserRole">访客</small>
                                </div>
                            </a>
                            <div class="account-dropdown-form dropdown-container">
                                <div class="form-content">
                                    <a href="#" id="logoutBtn">
                                        <i class="fas fa-sign-in-alt"></i>
                                        <span class="ml-2">登出</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
    </div>

    <div class="content-body">
        <div class="warper container-fluid">
            <div class="doctorino_settings main_container">
                <div class="row page-titles mx-0">
                    <div class="col-sm-6 p-md-0">
                        <div class="welcome-text">
                            <h4 class="text-primary">预约教室</h4>
                        </div>
                    </div>
                    <div class="col-sm-6 p-md-0 justify-content-sm-end mt-2 mt-sm-0 d-flex">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/student_index">首页</a></li>
                            <li class="breadcrumb-item active"><a href="/make_reservation">添加预约</a></li>
                        </ol>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title"> 选择教室 </h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-xl-4">
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label class="form-label">校区<span class="text-danger">*</span></label>
                                        <select class="form-control form-select" id="selectLocation">
                                            <option value="">选择校区</option>
                                            <option>南校区</option>
                                            <option>北校区</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-4">
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label class="form-label">教学楼</label>
                                        <select class="form-control form-select" id="selectBuildingName">
                                            <option value="">选择教学楼</option>
                                            <option>慕贤</option>
                                            <option>弘毅</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-4">
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label class="form-label">教室名称</label>
                                        <select class="form-control form-select" id="selectRoomName">
                                            <option value="">选择教室</option>
                                            <option>教室一</option>
                                            <option>教室二</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-4">
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label class="form-label">教室楼层</label>
                                        <select class="form-control form-select" id="selectRoomFloor">
                                            <option value="">选择教室楼层</option>
                                            <option>1</option>
                                            <option>2</option>
                                            <option>3</option>
                                            <option>4</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-4">
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label class="form-label">预约时间段</label>
                                        <select class="form-control form-select" id="selectTime">
                                            <option value="">预约时间</option>
                                            <option>07:00:00--08:00:00</option>
                                            <option>08:00:00--09:00:00</option>
                                            <option>09:00:00--10:00:00</option>
                                            <option>10:00:00--11:00:00</option>
                                            <option>11:00:00--12:00:00</option>
                                            <option>12:00:00--13:00:00</option>
                                            <option>13:00:00--14:00:00</option>
                                            <option>14:00:00--15:00:00</option>
                                            <option>15:00:00--16:00:00</option>
                                            <option>16:00:00--17:00:00</option>
                                            <option>17:00:00--18:00:00</option>
                                            <option>18:00:00--19:00:00</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-4">
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label>日期</label>
                                        <input id="daterange" class="form-control input-daterange-datepicker">
                                    </div>
                                </div>
                                <div class="form-group text-end">
                                    <button type="button" class="btn btn-primary" id="searchBtn">搜索</button>
                                    <button type="button" class="btn btn-success" id="reserveBtn">预约</button>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <div class="card shadow">
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table id="example1" class="display nowrap dataTable">
                                                <thead>
                                                <tr>
                                                    <th>校区</th>
                                                    <th>教学楼</th>
                                                    <th>教室名称</th>
                                                    <th>楼层</th>
                                                    <th>时段</th>
                                                    <th>日期</th>
                                                    <th>可预约数量</th>
                                                    <th></th>
                                                </tr>
                                                </thead>
                                                <tbody id="availableTableBody">
                                                <tr>
                                                    <td colspan="8" class="text-center">加载中...</td>
                                                </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <p class="text-danger mt-2 mb-0" id="makeReservationMsg"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/plugins/jquery/jquery.min.js"></script>
<script src="/assets/plugins/popper/popper.min.js"></script>
<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
<script src="/assets/plugins/moment/moment.min.js"></script>
<script src="/assets/plugins/daterangepicker/daterangepicker.min.js"></script>
<script src="/assets/plugins/datatables/jquery.dataTables.min.js"></script>
<script src="/assets/js/toggleFullScreen.js"></script>
<script src="/assets/js/main.js"></script>
<script src="/assets/js/app-shell.js"></script>
<script src="/assets/js/make_reservation_api.js"></script>
</body>
</html>
